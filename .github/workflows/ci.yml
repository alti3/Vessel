name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    name: Build and test (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: linux-x64
            runner: ubuntu-24.04
          - arch: linux-arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 11 preview
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 11.0.x
          dotnet-quality: preview

      - name: Validate project references
        shell: pwsh
        run: ./tools/validate-project-references.ps1

      - name: Restore
        run: dotnet restore Vessel.slnx

      - name: Format check
        run: dotnet format Vessel.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build Vessel.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Vessel.slnx --configuration Release --no-build --logger trx
